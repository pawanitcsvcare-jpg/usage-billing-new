<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="pt-ret-bg" x1="0" y1="0" x2="560" y2="360">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="pt-ret-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="pt-ret-heart" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="pt-ret-cycle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="560" height="360" rx="20" fill="url(#pt-ret-bg)"/>
  <!-- Heading aligned with tab: Retain Subscribers Every Cycle -->
  <g>
    <animate attributeName="opacity" values="0.94;1;0.94" dur="2.8s" repeatCount="indefinite"/>
    <text x="280" y="30" text-anchor="middle" fill="#0f766e" font-size="12" font-family="system-ui,sans-serif" font-weight="800" letter-spacing="0.08em">RETAIN SUBSCRIBERS</text>
    <text x="280" y="48" text-anchor="middle" fill="#be185d" font-size="13" font-family="system-ui,sans-serif" font-weight="800" letter-spacing="0.18em">EVERY CYCLE</text>
  </g>
  <!-- Animated cycle ring under headline -->
  <circle cx="280" cy="62" r="22" fill="none" stroke="url(#pt-ret-cycle)" stroke-width="2" stroke-dasharray="18 12" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 280 62" to="360 280 62" dur="8s" repeatCount="indefinite"/>
  </circle>
  <text x="280" y="67" text-anchor="middle" fill="#0f766e" font-size="9" font-family="system-ui,sans-serif" font-weight="700">365</text>

  <ellipse cx="280" cy="198" rx="168" ry="118" stroke="url(#pt-ret-ring)" stroke-width="2" fill="none" stroke-dasharray="12 14" opacity="0.55">
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 280 198" to="360 280 198" dur="48s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="280" cy="198" rx="132" ry="92" stroke="#fda4af" stroke-width="1.5" fill="none" opacity="0.45">
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="360 280 198" to="0 280 198" dur="36s" repeatCount="indefinite"/>
  </ellipse>
  <g transform="translate(280,193)">
    <circle cx="-90" cy="0" r="28" fill="#fff" stroke="#c4b5fd" stroke-width="2"/>
    <circle cx="0" cy="-35" r="32" fill="#fff" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="90" cy="0" r="28" fill="#fff" stroke="#c4b5fd" stroke-width="2"/>
    <circle cx="0" cy="45" r="30" fill="#fff" stroke="#86efac" stroke-width="2"/>
    <path d="M-90 -8v8M-90 8v4M0 -52v8M0 -36v4M90 -8v8M90 8v4M0 37v8M0 53v4" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(280,160)">
    <path d="M0 8 C-10 -8 -22 -8 -22 4 C-22 14 -10 22 0 28 C10 22 22 14 22 4 C22 -8 10 -8 0 8Z" fill="url(#pt-ret-heart)" opacity="0.92">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>
  <text x="280" y="326" text-anchor="middle" fill="#475569" font-size="10" font-family="system-ui,sans-serif" font-weight="600">At-risk signals to win-back journeys</text>
</svg>
