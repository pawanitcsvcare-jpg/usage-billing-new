<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 400" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="ubb-scene-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="40%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="ubb-bar-fill" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="ubb-bar-accent" x1="0" y1="1" x2="0" y2="0">
