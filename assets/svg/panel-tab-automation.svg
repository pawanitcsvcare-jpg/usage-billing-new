<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="pt-auto-bg" x1="0" y1="0" x2="560" y2="360">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#faf5ff"/>
    </linearGradient>
    <linearGradient id="pt-auto-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="pt-auto-gear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="560" height="360" rx="20" fill="url(#pt-auto-bg)"/>
  <!-- Heading aligned with tab: Automation? One and Done -->
  <g>
    <animate attributeName="opacity" values="0.93;1;0.93" dur="2.5s" repeatCount="indefinite"/>
    <text x="280" y="28" text-anchor="middle" fill="#7c3aed" font-size="13" font-family="system-ui,sans-serif" font-weight="800" letter-spacing="0.02em">AUTOMATION?</text>
    <text x="280" y="48" text-anchor="middle" fill="#0369a1" font-size="14" font-family="system-ui,sans-serif" font-weight="800" letter-spacing="0.2em">ONE AND DONE</text>
  </g>
  <text x="280" y="68" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui,sans-serif" font-weight="600" letter-spacing="0.14em">PROVISION · SYNC · SINGLE FLOW</text>

  <circle cx="96" cy="198" r="14" fill="#22d3ee" opacity="0.85"/>
  <circle cx="220" cy="198" r="14" fill="#6366f1"/>
  <circle cx="360" cy="198" r="14" fill="#a855f7"/>
  <circle cx="480" cy="198" r="18" fill="#22c55e">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <path d="M110 198 H206 M234 198 H346 M374 198 H462" stroke="url(#pt-auto-line)" stroke-width="3" stroke-linecap="round"/>
  <circle r="5" fill="#fde047"><animateMotion dur="3s" repeatCount="indefinite" path="M110 198 H462"/></circle>
  <g transform="translate(260,126)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="12s" repeatCount="indefinite"/>
      <circle r="34" fill="none" stroke="url(#pt-auto-gear)" stroke-width="8"/>
      <rect x="-4" y="-42" width="8" height="14" rx="2" fill="#7c3aed"/><rect x="-4" y="28" width="8" height="14" rx="2" fill="#7c3aed"/>
      <rect x="-42" y="-4" width="14" height="8" rx="2" fill="#7c3aed"/><rect x="28" y="-4" width="14" height="8" rx="2" fill="#7c3aed"/>
    </g>
  </g>
  <g transform="translate(340,256)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="9s" repeatCount="indefinite"/>
      <circle r="26" fill="none" stroke="#0ea5e9" stroke-width="6"/>
      <rect x="-3" y="-32" width="6" height="12" rx="1" fill="#0284c7"/><rect x="-3" y="20" width="6" height="12" rx="1" fill="#0284c7"/>
      <rect x="-32" y="-3" width="12" height="6" rx="1" fill="#0284c7"/><rect x="20" y="-3" width="12" height="6" rx="1" fill="#0284c7"/>
    </g>
  </g>
  <rect x="168" y="276" width="224" height="44" rx="12" fill="#fff" stroke="#e9d5ff" stroke-width="1.3"/>
  <path d="M188 300h52 M252 300h128" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
  <path d="M188 296l8 8 14-14" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <animate attributeName="stroke-width" values="3;4;3" dur="2s" repeatCount="indefinite"/>
  </path>
  <text x="280" y="342" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif" font-weight="600">Systems aligned: provision once</text>
</svg>
