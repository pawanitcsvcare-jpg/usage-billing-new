<svg xmlns="http://www.w3.org/2000/svg" width="85" height="197" viewBox="0 0 85 197" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="inv-bg" x1="0" y1="0" x2="85" y2="197" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="inv-paper" x1="14" y1="52" x2="71" y2="175" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="inv-sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#4338ca" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- ambient -->
  <ellipse cx="44" cy="175" rx="34" ry="18" fill="url(#inv-bg)" opacity="0.9"/>
  <!-- invoice sheet -->
  <g filter="url(#inv-sh)">
    <rect x="16" y="48" width="53" height="118" rx="10" fill="url(#inv-paper)" stroke="#c7d2fe" stroke-width="1.2"/>
    <!-- header bar -->
    <rect x="24" y="58" width="37" height="8" rx="2" fill="#4338ca" opacity="0.9"/>
    <!-- lines -->
    <rect x="24" y="74" width="37" height="2.5" rx="1" fill="#cbd5e1"/>
    <rect x="24" y="82" width="30" height="2.5" rx="1" fill="#e2e8f0"/>
    <rect x="24" y="90" width="33" height="2.5" rx="1" fill="#e2e8f0"/>
    <rect x="24" y="98" width="28" height="2.5" rx="1" fill="#e2e8f0"/>
    <!-- table rows -->
    <rect x="24" y="112" width="14" height="3" rx="1" fill="#6366f1" opacity="0.35"/>
    <rect x="47" y="112" width="14" height="3" rx="1" fill="#14b8a6" opacity="0.5"/>
    <rect x="24" y="120" width="14" height="3" rx="1" fill="#6366f1" opacity="0.25"/>
    <rect x="47" y="120" width="14" height="3" rx="1" fill="#14b8a6" opacity="0.4"/>
    <rect x="24" y="128" width="14" height="3" rx="1" fill="#6366f1" opacity="0.25"/>
    <rect x="47" y="128" width="14" height="3" rx="1" fill="#14b8a6" opacity="0.4"/>
    <!-- total block -->
    <rect x="22" y="142" width="41" height="14" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
    <rect x="26" y="147" width="18" height="4" rx="1" fill="#4338ca" opacity="0.85"/>
    <rect x="48" y="148" width="11" height="3" rx="1" fill="#047857"/>
    <!-- perforation hint -->
    <circle cx="42" cy="46" r="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  </g>
  <!-- stamp / paid accent -->
  <ellipse cx="58" cy="168" rx="14" ry="8" fill="none" stroke="#34d399" stroke-width="1.8" opacity="0.85" transform="rotate(-12 58 168)"/>
  <path d="M52 166 L56 170 L64 162" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
</svg>
